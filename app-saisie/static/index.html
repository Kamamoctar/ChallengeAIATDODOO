<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saisie Odoo — Togo Data AI Lab</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>⏱️ Saisie Odoo</h1>
    <p class="sub">Feuilles de temps quotidiennes — binôme Concours</p>
  </header>

  <main>
    <!-- ===================== SAISIE ===================== -->
    <section class="card">
      <h2>Nouvelle saisie</h2>
      <form id="form">
        <div class="row">
          <label>Équipier
            <select id="member" required></select>
          </label>
          <label>Date
            <input type="date" id="date" required />
          </label>
          <label>Heures
            <input type="number" id="hours" step="0.5" min="0.5" max="24"
                   value="1" required />
          </label>
        </div>

        <label>Projet
          <input type="text" id="projectSearch" placeholder="Tapez pour filtrer un projet…" autocomplete="off" />
          <select id="project" size="6" required></select>
        </label>

        <label>Tâche <span class="hint">(optionnel)</span>
          <select id="task" size="5">
            <option value="">— Aucune tâche —</option>
          </select>
        </label>

        <label>Description
          <input type="text" id="description" maxlength="500"
                 placeholder="Ex. Développement du module X" required />
        </label>

        <button type="submit" id="submit">Enregistrer dans Odoo</button>
        <div id="msg" class="msg"></div>
      </form>
    </section>

    <!-- ===================== TABLEAU DE BORD ===================== -->
    <section class="card">
      <div class="dash-head">
        <h2>Tableau de bord</h2>
        <select id="filterMember"><option value="">Tout le binôme</option></select>
      </div>
      <div class="kpis">
        <div class="kpi"><span id="kpiTotal">—</span><small>heures (14 j)</small></div>
        <div class="kpi"><span id="kpiCount">—</span><small>saisies (14 j)</small></div>
      </div>
      <table id="entries">
        <thead>
          <tr><th>Date</th><th>Équipier</th><th>Projet / Tâche</th><th>Desc.</th><th>h</th></tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
